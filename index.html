
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Axenro | Personal Health Tracker</title>
    <meta name="description" content="Track your fitness journey with precision. Monitor nutrition, log workouts, and visualize your progress with our premium fitness tracking platform." />
    <meta name="author" content="Axenro" />
    <meta property="og:image" content="/og-image.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon-512.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/app-icon-192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/app-icon-192.png">
    <link rel="icon" href="/app-icon-192.png" type="image/png">
  </head>

  <body>
    <!-- PWA Splash Screen -->
    <div id="splash-screen" style="
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: hsl(220, 25%, 8%);
      transition: opacity 0.5s ease, visibility 0.5s ease;
      overflow: hidden;
    ">
      <!-- Subtle glow behind logo -->
      <div style="
        position: absolute;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, hsla(210, 80%, 55%, 0.12) 0%, transparent 70%);
        filter: blur(40px);
        pointer-events: none;
      "></div>

      <!-- Logo -->
      <img
        src="/lovable-uploads/4df4b86d-bc17-46f1-ba5a-a9b628a52fbd.png"
        alt="Axenro"
        style="height: 48px; width: auto; object-fit: contain; margin-bottom: 40px; position: relative; animation: splashFadeIn 0.8s ease-out both;"
      />

      <!-- Loading dots -->
      <div style="display: flex; gap: 6px; position: relative;">
        <div style="width: 6px; height: 6px; border-radius: 50%; background: hsl(210, 70%, 60%); animation: splashDot 1.4s ease-in-out infinite;"></div>
        <div style="width: 6px; height: 6px; border-radius: 50%; background: hsl(210, 70%, 60%); animation: splashDot 1.4s ease-in-out 0.2s infinite;"></div>
        <div style="width: 6px; height: 6px; border-radius: 50%; background: hsl(210, 70%, 60%); animation: splashDot 1.4s ease-in-out 0.4s infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes splashFadeIn {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashDot {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.1); }
      }
    </style>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
